# Netlify build config — locks deploy settings into the repo so a typo
# in the dashboard can never break a build again.

[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Skip Playwright's chromium download on Netlify — we only use it
  # locally for the audit script, never in CI.
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

# Official Next.js runtime — handles App Router, RSC, static prerender,
# and serves files from public/ (including public/videos/*) correctly.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Long-cache the static video assets — they're content-addressed by
# filename, so safe to cache aggressively.
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
